<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra Interactiva</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Patrick+Hand&display=swap" rel="stylesheet">
    
    <!-- BoxIcons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Fabric.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <!-- Handwriting.js (Google Handwriting API Wrapper) -->
    <script src="https://rawcdn.githack.com/chenyuHo/handwriting.js/master/handwriting.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="canvas-container-wrapper">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Top Left Date Widget -->
    <div class="top-widget date-widget" id="date-widget" style="display: none;">
        <i class='bx bx-calendar'></i>
        <span id="current-date">Cargando fecha...</span>
    </div>

    <!-- Monthly Calendar Widget (Centered/Floating) -->
    <div class="top-widget calendar-widget" id="calendar-widget" style="display: none;">
        <div class="calendar-header">
            <button id="prev-month"><i class='bx bx-chevron-left'></i></button>
            <h3 id="calendar-month-year">Mes Año</h3>
            <button id="next-month"><i class='bx bx-chevron-right'></i></button>
        </div>
        <div class="calendar-days-header">
            <span>Do</span><span>Lu</span><span>Ma</span><span>Mi</span><span>Ju</span><span>Vi</span><span>Sa</span>
        </div>
        <div class="calendar-days-grid" id="calendar-days">
            <!-- Días generados por JS -->
        </div>
    </div>

    <!-- Clock Widget -->
    <div class="top-widget clock-widget" id="clock-widget" style="display: none;">
        <div id="digital-clock" class="digital-display">00:00:00</div>
    </div>

    <!-- Timer Widget -->
    <div class="top-widget timer-widget" id="timer-widget" style="display: none;">
        <div class="widget-header">
            <span>Temporizador</span>
            <div class="header-actions">
                <button id="btn-reset-timer" title="Reiniciar"><i class='bx bx-reset'></i></button>
            </div>
        </div>
        
        <div class="timer-main-controls">
            <div class="time-adjuster">
                <button class="adj-btn small" onclick="adjustTimer('min', 1)"><i class='bx bx-chevron-up'></i></button>
                <span id="display-min">05</span>
                <button class="adj-btn small" onclick="adjustTimer('min', -1)"><i class='bx bx-chevron-down'></i></button>
            </div>
            <span class="main-sep">:</span>
            <div class="time-adjuster">
                <button class="adj-btn small" onclick="adjustTimer('sec', 1)"><i class='bx bx-chevron-up'></i></button>
                <span id="display-sec">00</span>
                <button class="adj-btn small" onclick="adjustTimer('sec', -1)"><i class='bx bx-chevron-down'></i></button>
            </div>
        </div>
        
        <div class="timer-actions">
            <button id="btn-start-timer" class="btn-primary-action">Iniciar</button>
        </div>
    </div>

    <!-- Discrete Bottom Toolbar -->
    <div class="toolbar">
        <!-- Tools -->
        <div class="tool-group">
            <button class="tool-btn active" id="btn-select" title="Seleccionar y Mover">
                <i class='bx bx-pointer'></i>
            </button>
            <button class="tool-btn" id="btn-move" title="Mover Objetos (Mano)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/>
                    <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10"/>
                    <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/>
                    <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
                </svg>
            </button>
            <button class="tool-btn" id="btn-draw" title="Lápiz / Dibujar">
                <i class='bx bx-pencil'></i>
            </button>
            <button class="tool-btn" id="btn-line" title="Línea Recta">
                <i class='bx bx-minus'></i>
            </button>
            <button class="tool-btn" id="btn-eraser" title="Goma de Borrar">
                <i class='bx bxs-eraser'></i>
            </button>
            <button class="tool-btn" id="btn-ocr" title="Reconocimiento de Texto y Números">
                <span style="font-size: 14px; font-weight: bold;">ABC</span>
            </button>
        </div>

        <div class="divider"></div>

        <!-- Figuras (Dropup) -->
        <div class="tool-group dropup">
            <button class="tool-btn dropbtn" id="btn-shapes-menu" title="Figuras Geométricas">
                <i class='bx bx-category'></i>
            </button>
            
            <div class="dropup-content">
                <button class="tool-btn" id="btn-square" title="Cuadrado">
                    <i class='bx bx-square'></i>
                </button>
                <button class="tool-btn" id="btn-rect" title="Rectángulo">
                    <i class='bx bx-rectangle'></i>
                </button>
                <button class="tool-btn" id="btn-circle" title="Círculo">
                    <i class='bx bx-circle'></i>
                </button>
                <button class="tool-btn" id="btn-triangle" title="Triángulo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3L2 20h20L12 3z"/>
                    </svg>
                </button>
                
                <div class="polygon-container" title="Polígono (Elige N° de Lados)">
                    <button class="tool-btn" id="btn-polygon">
                        <i class='bx bx-polygon'></i>
                    </button>
                    <div class="sides-input-wrapper">
                        <span>Lados:</span>
                        <input type="number" id="polygon-sides" min="3" max="12" value="5">
                    </div>
                </div>

                <button class="tool-btn" id="btn-custom-polygon" title="Trazar Figura (Punto a Punto)">
                    <i class='bx bx-shape-triangle'></i>
                </button>
                
                <button class="tool-btn" id="btn-angle" title="Dibujar Ángulo Interactivo (3 puntos)">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 20H4V4"/>
                        <path d="M12 20a8 8 0 0 0-8-8"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- El menú original de estilos ha sido movido al side-panel -->
        
                
                <!-- Botón para abrir/cerrar paleta lateral -->
        <div class="tool-group">
            <button class="tool-btn" id="btn-toggle-palette" title="Estilos y Color">
                <i class='bx bx-palette'></i>
            </button>
        </div>

        <div class="divider"></div>

        <!-- Controles de Fondo (Dropup) -->
        <div class="tool-group dropup grid-disabled" id="bg-group">
            <button class="tool-btn dropbtn" id="btn-grid" title="Activar/Desactivar Cuadrícula">
                <i class='bx bx-grid'></i>
            </button>
            
            <div class="dropup-content">
                <div class="range-container grid-size-container" title="Tamaño de la Cuadrícula">
                    <i class='bx bx-grid-vertical'></i>
                    <input type="range" id="grid-size" min="15" max="150" value="40">
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Acciones Globales -->
        <div class="tool-group">
            <button class="tool-btn" id="btn-protractor" title="Añadir Transportador">
                <i class='bx bx-compass'></i>
            </button>
            <button class="tool-btn" id="btn-ruler" title="Añadir Regla 60cm">
                <i class='bx bx-ruler'></i>
            </button>

            <button class="tool-btn" id="btn-toggle-timer" title="Temporizador">
                <i class='bx bx-timer'></i>
            </button>
            <button class="tool-btn" id="btn-toggle-clock" title="Mostrar Reloj">
                <i class='bx bx-time'></i>
            </button>
            <button class="tool-btn" id="btn-toggle-calendar" title="Mostrar Calendario Mensual">
                <i class='bx bx-calendar-event'></i>
            </button>
            <button class="tool-btn" id="btn-toggle-date" title="Mostrar/Ocultar Fecha">
                <i class='bx bx-calendar'></i>
            </button>
            <button class="tool-btn" id="btn-undo" title="Deshacer (Ctrl+Z)">
                <i class='bx bx-undo'></i>
            </button>
            <button class="tool-btn" id="btn-redo" title="Rehacer (Ctrl+Y)">
                <i class='bx bx-redo'></i>
            </button>
            <div class="divider"></div>
            <button class="tool-btn" id="btn-delete" title="Borrar Toda la Pizarra">
                <i class='bx bx-trash'></i>
            </button>
            <button class="tool-btn" id="btn-fullscreen" title="Pantalla Completa">
                <i class='bx bx-fullscreen'></i>
            </button>
            <div class="divider"></div>
            <button class="tool-btn" id="btn-hide-toolbar" title="Ocultar Barra">
                <i class='bx bx-chevron-down'></i>
            </button>
        </div>
    </div>

    <!-- Botón para volver a mostrar la barra -->
    <button id="btn-show-toolbar" title="Mostrar Barra" class="show-toolbar-btn">
        <i class='bx bx-chevron-up'></i>
    </button>

    <!-- Side Panel (Vertical Palette) -->
    <div class="side-panel" id="side-palette">
        <div class="side-panel-content">
            <h4 class="panel-title">Color</h4>
            <div class="color-swatches vertical">
                <button class="swatch active" data-color="#2d3748" style="background-color: #2d3748;" title="Gris Oscuro"></button>
                <button class="swatch" data-color="#ef798a" style="background-color: #ef798a;" title="Rojo Suave / Coral"></button>
                <button class="swatch" data-color="#f7a976" style="background-color: #f7a976;" title="Naranja Suave"></button>
                <button class="swatch" data-color="#fadd75" style="background-color: #fadd75;" title="Amarillo Suave"></button>
                <button class="swatch" data-color="#82d192" style="background-color: #82d192;" title="Verde Suave"></button>
                <button class="swatch" data-color="#6bc0cc" style="background-color: #6bc0cc;" title="Turquesa"></button>
                <button class="swatch" data-color="#7fb5ff" style="background-color: #7fb5ff;" title="Celeste Suave"></button>
                <button class="swatch" data-color="#9a8ced" style="background-color: #9a8ced;" title="Morado Suave"></button>
                <button class="swatch" data-color="#f28ab0" style="background-color: #f28ab0;" title="Rosa Suave"></button>
            </div>
            
            <div class="sidebar-divider"></div>
            
            <h4 class="panel-title">Trazo</h4>
            <div class="range-container vertical">
                <input type="range" id="stroke-width" min="1" max="50" value="4" orient="vertical">
            </div>
        </div>
    </div>

    <!-- App Script -->
    <script src="script.js"></script>
</body>
</html>
